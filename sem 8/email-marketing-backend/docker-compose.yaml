services:
  email_marketing_backend:
    image: email_marketing_backend
    container_name: email_marketing_backend
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ./:/var/www
    networks:
      - default

  email_marketing_backend_ws:
    build:
      context: .
      dockerfile: build/Dockerfile-nginx
    image: email_marketing_backend_nginx
    container_name: email_marketing_backend_ws
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./:/var/www
      - ./build/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - email_marketing_backend
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: email_marketing_backend_redis
    ports:
      - "8019:6379"
    networks:
      - default

volumes:
  email_marketing_backend_volume:

networks:
  default:

